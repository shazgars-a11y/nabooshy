<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0910;width:260px;height:250px;overflow:hidden;font-family:'DM Sans','Space Grotesk',sans-serif;}
.wrap{width:260px;height:250px;background:#0a0910;border:1px solid #1D9E7530;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;position:relative;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(40px);pointer-events:none;}
.o1{width:180px;height:180px;background:#7F77DD18;top:-70px;left:-60px;}
.o2{width:120px;height:120px;background:#1D9E7515;bottom:-40px;right:-40px;}
.dots{display:flex;gap:5px;position:relative;z-index:2;}
.dot{width:6px;height:6px;border-radius:50%;animation:db 2s ease-in-out infinite;}
.d1{background:#7F77DD;animation-delay:0s;}
.d2{background:#1D9E75;animation-delay:.3s;}
.d3{background:#D4537E;animation-delay:.6s;}
@keyframes db{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
.logo{font-size:20px;font-weight:700;background:linear-gradient(90deg,#7F77DD,#1D9E75,#D4537E,#EF9F27);-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:2;}
.title{font-size:13px;font-weight:600;color:#e8e6ff;text-align:center;position:relative;z-index:2;line-height:1.4;}
.sub{font-size:11px;color:#6b6880;text-align:center;position:relative;z-index:2;line-height:1.5;}
.cta{background:linear-gradient(135deg,#1D9E75,#5DCAA5);color:#fff;font-size:11px;font-weight:600;padding:8px 18px;border-radius:7px;border:none;cursor:pointer;position:relative;z-index:2;}
</style>
</head>
<body>
<div class="wrap">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="dots"><div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div></div>
  <div class="logo">nabooshy</div>
  <div class="title">Энд таны зар байршина</div>
  <div class="sub">Монголын хамгийн шилдэг сайт дээр зараа байршуул</div>
  <button class="cta">9937-6238</button>
</div>
</body>
</html>
