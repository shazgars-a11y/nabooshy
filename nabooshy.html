<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nabooshy — Монгол Хадмал</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --bg4: #22222e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8e8f0;
  --text2: #9494aa;
  --text3: #5a5a6e;
  --accent: #e8c547;
  --accent2: #c9a82c;
  --red: #e85c5c;
  --teal: #4ecdc4;
  --radius: 12px;
  --radius-lg: 18px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── NOISE TEXTURE ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,15,0.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  display:flex;align-items:center;gap:20px;height:64px;
}
.logo{
  font-family:'DM Serif Display',serif;
  font-size:22px;letter-spacing:-0.5px;
  color:var(--accent);white-space:nowrap;
  flex-shrink:0;
}
.logo span{color:var(--text2);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:300;margin-left:6px;vertical-align:middle;}
.search-wrap{
  flex:1;max-width:420px;
  position:relative;
}
.search-wrap input{
  width:100%;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:8px;
  padding:9px 16px 9px 40px;
  color:var(--text);font-size:14px;
  font-family:'DM Sans',sans-serif;
  outline:none;transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--border2);}
.search-wrap input::placeholder{color:var(--text3);}
.search-wrap .icon{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--text3);pointer-events:none;
}
.header-filters{
  display:flex;gap:6px;margin-left:auto;
}
.filter-btn{
  background:transparent;border:1px solid var(--border);
  color:var(--text2);padding:6px 14px;border-radius:6px;
  font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .15s;
}
.filter-btn:hover,.filter-btn.active{
  background:var(--accent);color:#000;
  border-color:var(--accent);font-weight:600;
}
.stats-badge{
  font-size:12px;color:var(--text3);white-space:nowrap;
}

/* ── GENRE STRIP ── */
.genre-strip{
  display:flex;gap:6px;padding:12px 24px;
  overflow-x:auto;border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
.genre-strip::-webkit-scrollbar{display:none}
.genre-tag{
  flex-shrink:0;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);padding:5px 12px;border-radius:20px;
  font-size:12px;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.genre-tag:hover,.genre-tag.active{
  background:var(--bg4);border-color:var(--border2);color:var(--text);
}
.genre-tag.active{
  background:rgba(232,197,71,0.12);border-color:rgba(232,197,71,0.4);color:var(--accent);
}

/* ── GRID ── */
main{padding:28px 24px;position:relative;z-index:1;}
.section-title{
  font-family:'DM Serif Display',serif;
  font-size:17px;color:var(--text2);
  margin-bottom:18px;letter-spacing:0.2px;
}
.section-title span{color:var(--text3);font-size:13px;font-family:'DM Sans',sans-serif;margin-left:8px;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;
}

/* ── CARD ── */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;cursor:pointer;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  position:relative;
}
.card:hover{
  transform:translateY(-4px);
  border-color:var(--border2);
  box-shadow:0 12px 40px rgba(0,0,0,0.5);
}
.card-poster{
  aspect-ratio:2/3;
  background:var(--bg3);
  position:relative;overflow:hidden;
}
.card-poster img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .3s;display:block;
}
.card:hover .card-poster img{transform:scale(1.04);}
.card-poster .no-poster{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:8px;color:var(--text3);
  background:linear-gradient(160deg,var(--bg3) 0%,var(--bg4) 100%);
}
.card-poster .no-poster .np-icon{font-size:32px;opacity:.4;}
.card-poster .no-poster .np-slug{
  font-size:10px;word-break:break-all;text-align:center;
  padding:0 12px;opacity:.5;
}
.badge{
  position:absolute;top:8px;left:8px;
  font-size:10px;font-weight:600;letter-spacing:0.5px;
  padding:3px 7px;border-radius:4px;
  text-transform:uppercase;
}
.badge-movie{background:rgba(78,205,196,0.85);color:#000;}
.badge-tv{background:rgba(232,92,92,0.85);color:#fff;}
.badge-embed{
  position:absolute;top:8px;right:8px;
  background:rgba(232,197,71,0.9);color:#000;
  font-size:10px;font-weight:700;
  padding:3px 7px;border-radius:4px;
}
.card-info{padding:10px 12px 12px;}
.card-title{
  font-size:13px;font-weight:500;
  line-height:1.35;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:6px;
}
.card-meta{
  display:flex;align-items:center;gap:6px;
  flex-wrap:wrap;
}
.card-year{font-size:11px;color:var(--text3);}
.card-rating{
  font-size:11px;font-weight:600;
  color:var(--accent);display:flex;align-items:center;gap:3px;
}
.card-rating::before{content:'★';}
.card-genres{
  display:flex;gap:3px;flex-wrap:wrap;margin-top:5px;
}
.card-genre{
  font-size:10px;color:var(--text3);
  background:var(--bg4);padding:2px 6px;
  border-radius:3px;
}
.ep-count{
  position:absolute;bottom:8px;right:8px;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);
  color:var(--text2);font-size:10px;
  padding:3px 7px;border-radius:4px;
}
.no-results{
  grid-column:1/-1;text-align:center;
  padding:60px 0;color:var(--text3);
  font-size:15px;
}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.88);
  backdrop-filter:blur(8px);
  display:flex;align-items:flex-start;justify-content:center;
  padding:20px;overflow-y:auto;
  opacity:0;pointer-events:none;
  transition:opacity .25s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:var(--radius-lg);
  width:100%;max-width:820px;
  overflow:hidden;
  transform:translateY(20px);
  transition:transform .25s;
  position:relative;margin:auto;
}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-close{
  position:absolute;top:14px;right:14px;z-index:10;
  background:rgba(255,255,255,0.08);border:none;
  color:var(--text2);width:34px;height:34px;
  border-radius:50%;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.modal-close:hover{background:rgba(255,255,255,0.15);}

/* modal hero */
.modal-hero{
  display:flex;gap:0;
}
.modal-poster{
  flex-shrink:0;width:200px;
  background:var(--bg3);
}
.modal-poster img{width:100%;display:block;object-fit:cover;min-height:280px;}
.modal-poster .no-poster-lg{
  width:100%;min-height:280px;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;opacity:.2;
  background:linear-gradient(160deg,var(--bg3),var(--bg4));
}
.modal-meta{
  flex:1;padding:28px 24px 20px;
  display:flex;flex-direction:column;gap:10px;
}
.modal-badges{display:flex;gap:6px;align-items:center;}
.modal-title{
  font-family:'DM Serif Display',serif;
  font-size:26px;line-height:1.2;
  color:var(--text);
}
.modal-rating-row{display:flex;align-items:center;gap:12px;}
.modal-rating{
  font-size:22px;font-weight:700;color:var(--accent);
}
.modal-stars{font-size:14px;color:var(--accent);letter-spacing:1px;}
.modal-year{
  font-size:13px;color:var(--text3);
  background:var(--bg4);padding:3px 10px;border-radius:4px;
}
.modal-genres{display:flex;gap:6px;flex-wrap:wrap;}
.modal-genre-tag{
  font-size:11px;color:var(--text2);
  background:var(--bg4);border:1px solid var(--border);
  padding:4px 10px;border-radius:20px;
}
.modal-synopsis{
  font-size:13.5px;line-height:1.65;
  color:var(--text2);
  border-top:1px solid var(--border);
  padding-top:12px;margin-top:2px;
}
.modal-sources{
  display:flex;gap:8px;flex-wrap:wrap;
  margin-top:auto;padding-top:10px;
}
.source-link{
  font-size:11px;color:var(--text3);
  text-decoration:none;
  background:var(--bg4);border:1px solid var(--border);
  padding:4px 10px;border-radius:5px;
  transition:border-color .15s,color .15s;
  display:flex;align-items:center;gap:5px;
}
.source-link:hover{border-color:var(--border2);color:var(--text2);}

/* modal body */
.modal-body{padding:0 24px 24px;}
.player-section{margin-bottom:20px;}
.player-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.player-label{
  font-size:12px;font-weight:600;
  color:var(--text3);letter-spacing:1px;text-transform:uppercase;
}
.player-frame{
  background:#000;border-radius:10px;overflow:hidden;
  aspect-ratio:16/9;position:relative;
}
.player-frame iframe{
  width:100%;height:100%;border:none;display:block;
}
.no-embed-msg{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:10px;
  color:var(--text3);font-size:13px;text-align:center;
  padding:20px;min-height:160px;
}
.no-embed-msg .msg-icon{font-size:28px;opacity:.4;}

/* episodes */
.episodes-section{}
.ep-section-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;
}
.ep-section-title{
  font-size:12px;font-weight:600;
  color:var(--text3);letter-spacing:1px;text-transform:uppercase;
}
.ep-count-badge{
  background:var(--bg4);border:1px solid var(--border);
  font-size:11px;color:var(--text3);
  padding:2px 8px;border-radius:10px;
}
.ep-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:6px;
}
.ep-btn{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);border-radius:8px;
  padding:10px 6px;cursor:pointer;
  font-size:12px;font-family:'DM Sans',sans-serif;
  transition:all .15s;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.ep-btn:hover{
  background:var(--bg4);border-color:var(--border2);color:var(--text);
}
.ep-btn.active{
  background:rgba(232,197,71,0.1);
  border-color:rgba(232,197,71,0.5);
  color:var(--accent);
}
.ep-btn.no-embed-ep{opacity:.45;}
.ep-num{font-size:18px;font-weight:600;line-height:1;}
.ep-label{font-size:10px;color:var(--text3);}
.ep-btn.active .ep-label{color:rgba(232,197,71,0.7);}

/* ── EMPTY STATE ── */
.empty{
  text-align:center;padding:80px 20px;
  color:var(--text3);
}
.empty-icon{font-size:48px;opacity:.2;margin-bottom:16px;}
.empty p{font-size:15px;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  header{padding:0 16px;}
  .header-filters{display:none;}
  main{padding:20px 16px;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
  .modal-hero{flex-direction:column;}
  .modal-poster{width:100%;}
  .modal-poster img{min-height:200px;object-fit:cover;max-height:240px;}
  .modal-title{font-size:20px;}
  .ep-grid{grid-template-columns:repeat(auto-fill,minmax(70px,1fr));}
}
</style>
</head>

// ── STATE ──
let state = { type: 'all', genre: '', search: '', current: null, currentEpIdx: 0 };

// ── INIT ──
function init() {
  buildGenres();
  bindEvents();
  render();
}

function getGenres() {
  const g = new Set();
  DATA.forEach(d => d.genres.forEach(x => { if(x) g.add(x); }));
  return ['Бүгд', ...Array.from(g).sort()];
}

function buildGenres() {
  const strip = document.getElementById('genreStrip');
  getGenres().forEach(g => {
    const btn = document.createElement('div');
    btn.className = 'genre-tag' + (g==='Бүгд'?' active':'');
    btn.textContent = g;
    btn.onclick = () => {
      state.genre = g==='Бүгд' ? '' : g;
      strip.querySelectorAll('.genre-tag').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    strip.appendChild(btn);
  });
}

function bindEvents() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.type = btn.dataset.type;
      render();
    };
  });
  document.getElementById('searchInput').addEventListener('input', e => {
    state.search = e.target.value.toLowerCase();
    render();
  });
}

function filtered() {
  return DATA.filter(d => {
    if (state.type === 'movies' && d.type !== 'movies') return false;
    if (state.type === 'tvshows' && d.type !== 'tvshows') return false;
    if (state.type === 'embed' && !d.embed_url && !d.episodes?.some(e => e.embed_url)) return false;
    if (state.genre && !d.genres.includes(state.genre)) return false;
    if (state.search) {
      const q = state.search;
      if (!d.title.toLowerCase().includes(q) &&
          !d.synopsis.toLowerCase().includes(q) &&
          !d.genres.join(' ').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function render() {
  const items = filtered();
  const grid = document.getElementById('grid');
  const title = document.getElementById('sectionTitle');
  const stats = document.getElementById('statsBadge');

  const withEmbed = DATA.filter(d => d.embed_url || d.episodes?.some(e=>e.embed_url)).length;
  stats.textContent = `${DATA.length} нийт · ${withEmbed} embed`;

  const typeMap = {all:'Бүгд', movies:'Кино', tvshows:'Цуврал', embed:'Линктэй'};
  title.innerHTML = `${typeMap[state.type] || 'Бүгд'} <span>${items.length} илдэв</span>`;

  grid.innerHTML = '';
  if (!items.length) {
    grid.innerHTML = '<div class="no-results">🎬 Илдэв олдсонгүй</div>';
    return;
  }

  items.forEach(d => {
    const hasEmbed = d.embed_url || d.episodes?.some(e=>e.embed_url);
    const epCount = d.episodes?.length || 0;
    const stars = d.rating ? '★'.repeat(Math.round(parseFloat(d.rating)/2)).padEnd(5,'☆') : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-poster">
        ${d.poster_url
          ? `<img src="${d.poster_url}" alt="${d.title}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\"no-poster\\"><div class=\\"np-icon\\">🎬</div><div class=\\"np-slug\\">${d.id}</div></div>'">`
          : `<div class="no-poster"><div class="np-icon">🎬</div><div class="np-slug">${d.id}</div></div>`}
        <span class="badge ${d.type==='movies'?'badge-movie':'badge-tv'}">${d.type==='movies'?'Кино':'Цуврал'}</span>
        ${hasEmbed ? '<span class="badge-embed">▶</span>' : ''}
        ${epCount > 0 ? `<span class="ep-count">${epCount} анги</span>` : ''}
      </div>
      <div class="card-info">
        <div class="card-title">${d.title}</div>
        <div class="card-meta">
          ${d.year ? `<span class="card-year">${d.year}</span>` : ''}
          ${d.rating ? `<span class="card-rating">${parseFloat(d.rating).toFixed(1)}</span>` : ''}
        </div>
        ${d.genres.length ? `<div class="card-genres">${d.genres.slice(0,3).map(g=>`<span class="card-genre">${g}</span>`).join('')}</div>` : ''}
      </div>`;
    card.onclick = () => openModal(d);
    grid.appendChild(card);
  });
}

// ── MODAL ──
let currentItem = null;

function openModal(d) {
  currentItem = d;
  state.currentEpIdx = 0;

  // Find best initial embed
  const mainEmbed = d.embed_url;
  const firstEpEmbed = d.episodes?.find(e=>e.embed_url)?.embed_url;

  // Poster
  document.getElementById('modalPoster').innerHTML = d.poster_url
    ? `<img src="${d.poster_url}" alt="${d.title}" onerror="this.outerHTML='<div class=\\"no-poster-lg\\">🎬</div>'">`
    : `<div class="no-poster-lg">🎬</div>`;

  // Meta
  const stars = d.rating ? Array.from({length:5},(_,i)=>i<Math.round(parseFloat(d.rating)/2)?'★':'☆').join('') : '';
  document.getElementById('modalMeta').innerHTML = `
    <div class="modal-badges">
      <span class="badge ${d.type==='movies'?'badge-movie':'badge-tv'}">${d.type==='movies'?'Кино':'Цуврал'}</span>
      ${mainEmbed||firstEpEmbed ? '<span class="badge-embed">▶ Тоглуулах боломжтой</span>' : ''}
    </div>
    <div class="modal-title">${d.title}</div>
    ${d.rating || d.year ? `
    <div class="modal-rating-row">
      ${d.rating ? `<div class="modal-rating">${parseFloat(d.rating).toFixed(1)}</div>` : ''}
      ${d.rating ? `<div class="modal-stars">${stars}</div>` : ''}
      ${d.year ? `<div class="modal-year">${d.year}</div>` : ''}
    </div>` : ''}
    ${d.genres.length ? `<div class="modal-genres">${d.genres.map(g=>`<span class="modal-genre-tag">${g}</span>`).join('')}</div>` : ''}
    ${d.synopsis ? `<div class="modal-synopsis">${d.synopsis}</div>` : ''}
    <div class="modal-sources">
      ${d.lolokino_url ? `<a href="${d.lolokino_url}" target="_blank" class="source-link">↗ lolokino</a>` : ''}
      ${d.mglguide_url ? `<a href="${d.mglguide_url}" target="_blank" class="source-link">↗ mglguide</a>` : ''}
    </div>`;

  // Body: player + episodes
  renderModalBody(d, mainEmbed || firstEpEmbed);

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderModalBody(d, activeEmbed) {
  const body = document.getElementById('modalBody');
  const episodes = d.episodes || [];

  let playerHtml = '';
  if (activeEmbed) {
    playerHtml = `
      <div class="player-section">
        <div class="player-header">
          <div class="player-label">▶ Тоглуулагч</div>
        </div>
        <div class="player-frame">
          <iframe src="${activeEmbed}" allowfullscreen allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
        </div>
      </div>`;
  } else {
    playerHtml = `
      <div class="player-section">
        <div class="player-header"><div class="player-label">▶ Тоглуулагч</div></div>
        <div class="player-frame">
          <div class="no-embed-msg">
            <div class="msg-icon">⏳</div>
            <div>Embed линк одоогоор алга байна</div>
            <div style="font-size:11px;margin-top:4px;opacity:.6">mglguide-аас татаж нэмэх боломжтой</div>
          </div>
        </div>
      </div>`;
  }

  let epsHtml = '';
  if (episodes.length > 0) {
    epsHtml = `
      <div class="episodes-section">
        <div class="ep-section-header">
          <div class="ep-section-title">Ангиуд</div>
          <div class="ep-count-badge">${episodes.length} анги</div>
        </div>
        <div class="ep-grid">
          ${episodes.map((ep, i) => {
            const hasEmbed = !!ep.embed_url;
            const label = ep.season ? `S${ep.season}E${ep.episode}` : ep.episode ? `${ep.episode}-р анги` : `Анги`;
            return `<button class="ep-btn ${!hasEmbed?'no-embed-ep':''} ${i===0?'active':''}" 
              onclick="playEpisode(${i})" data-idx="${i}">
              <span class="ep-num">${ep.episode || (i+1)}</span>
              <span class="ep-label">${ep.season ? `S${ep.season}` : 'Анги'}</span>
            </button>`;
          }).join('')}
        </div>
      </div>`;
  }

  body.innerHTML = playerHtml + epsHtml;
}

function playEpisode(idx) {
  if (!currentItem) return;
  const ep = currentItem.episodes[idx];
  if (!ep) return;

  // Update active button
  document.querySelectorAll('.ep-btn').forEach((b,i) => {
    b.classList.toggle('active', i===idx);
  });

  // Update player
  const frame = document.querySelector('.player-frame');
  if (!frame) return;
  if (ep.embed_url) {
    frame.innerHTML = `<iframe src="${ep.embed_url}" allowfullscreen allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>`;
  } else {
    frame.innerHTML = `<div class="no-embed-msg"><div class="msg-icon">⏳</div><div>Энэ ангийн embed алга байна</div></div>`;
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentItem = null;
  // Stop video
  const frame = document.querySelector('.player-frame iframe');
  if (frame) frame.src = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

init();
</script>
</body>
</html>
