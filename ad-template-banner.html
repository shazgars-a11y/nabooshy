<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0910;width:728px;height:90px;overflow:hidden;font-family:'DM Sans','Space Grotesk',sans-serif;}
.wrap{width:728px;height:90px;background:#0a0910;border:1px solid #7F77DD30;border-radius:10px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:relative;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(40px);pointer-events:none;}
.o1{width:150px;height:150px;background:#7F77DD22;top:-60px;left:-30px;}
.o2{width:100px;height:100px;background:#1D9E7518;bottom:-40px;right:80px;}
.logo{font-size:22px;font-weight:700;background:linear-gradient(90deg,#7F77DD,#1D9E75,#D4537E,#EF9F27);-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:2;flex-shrink:0;}
.mid{flex:1;text-align:center;padding:0 20px;position:relative;z-index:2;}
.title{font-size:14px;font-weight:600;color:#e8e6ff;}
.sub{font-size:11px;color:#6b6880;margin-top:3px;}
.cta{background:linear-gradient(135deg,#534AB7,#7F77DD);color:#fff;font-size:12px;font-weight:600;padding:9px 20px;border-radius:8px;border:none;cursor:pointer;flex-shrink:0;position:relative;z-index:2;white-space:nowrap;}
.sweep{position:absolute;inset:0;background:linear-gradient(90deg,transparent,#7F77DD08,transparent);animation:sw 3s ease-in-out infinite;pointer-events:none;}
@keyframes sw{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="sweep"></div>
  <div class="logo">nabooshy</div>
  <div class="mid">
    <div class="title">Энд таны зар байршина</div>
    <div class="sub">Монголын хамгийн шилдэг сайт · Өдөрт олон хүн үзнэ · 9937-6238</div>
  </div>
  <button class="cta">Холбоо барих →</button>
</div>
</body>
</html>
