<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0910;width:360px;height:60px;overflow:hidden;font-family:'DM Sans','Space Grotesk',sans-serif;}
.wrap{width:360px;height:60px;background:#0a0910;border:1px solid #D4537E30;border-radius:8px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;position:relative;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(30px);pointer-events:none;}
.o1{width:80px;height:80px;background:#D4537E18;top:-20px;right:60px;}
.logo{font-size:16px;font-weight:700;background:linear-gradient(90deg,#7F77DD,#1D9E75,#D4537E,#EF9F27);-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:2;flex-shrink:0;}
.mid{flex:1;padding:0 10px;position:relative;z-index:2;}
.title{font-size:12px;font-weight:500;color:#e8e6ff;}
.sub{font-size:10px;color:#6b6880;}
.cta{background:#D4537E;color:#fff;font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;border:none;cursor:pointer;white-space:nowrap;position:relative;z-index:2;}
</style>
</head>
<body>
<div class="wrap">
  <div class="orb o1"></div>
  <div class="logo">nabooshy</div>
  <div class="mid">
    <div class="title">Энд таны зар байршина</div>
    <div class="sub">9937-6238 · gnarantsend@gmail.com</div>
  </div>
  <button class="cta">Холбоо →</button>
</div>
</body>
</html>
