<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Дайби</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body { background:#060a14; font-family:'Georgia',serif; min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }



/* ТОГЛООМ */
#gameWrap { position:relative; display:flex; flex-direction:column; align-items:center; }
canvas { display:block; max-width:100vw; max-height:100vh; }
#ui { position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:space-between; padding:14px 20px; pointer-events:none; }
.btn { pointer-events:all; width:66px; height:66px; border-radius:50%; border:2px solid rgba(100,200,255,0.4); background:rgba(0,0,0,0.5); color:#7df; font-size:26px; display:flex; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; backdrop-filter:blur(6px); cursor:pointer; }
.btn:active { background:rgba(100,200,255,0.25); }
#lc,#rc { display:flex; gap:10px; }

/* LEADERBOARD */
#lbOverlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:50; padding:20px; }
#lbOverlay h2 { color:#7df; font-size:26px; margin-bottom:3px; letter-spacing:3px; }
.lbTimer { color:#4a7aaa; font-size:12px; margin-bottom:16px; }
.lbTable { width:min(360px,92vw); border:1px solid rgba(100,180,255,0.2); border-radius:14px; overflow:hidden; background:rgba(10,20,40,0.92); }
.lbRow { display:flex; align-items:center; gap:12px; padding:11px 17px; border-bottom:1px solid rgba(100,180,255,0.09); }
.lbRow:last-child { border-bottom:none; }
.lbRank { width:30px; font-size:18px; }
.lbName { flex:1; color:#cee; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lbScore { color:#ffd700; font-size:14px; font-weight:bold; }
.lbEmpty { color:#4a6a8a; text-align:center; padding:22px; font-size:13px; }
#myRank { color:#aaa; font-size:13px; margin-top:11px; }
.lbPlayBtn { margin-top:18px; padding:12px 38px; background:linear-gradient(135deg,#1a4a7a,#0a2a4a); border:1px solid rgba(100,200,255,0.35); border-radius:10px; color:#7df; font-size:16px; font-family:Georgia,serif; cursor:pointer; letter-spacing:1px; }

/* Мини LB */
#miniLb { position:fixed; top:58px; right:10px; background:rgba(5,12,25,0.85); border:1px solid rgba(100,180,255,0.16); border-radius:10px; padding:8px 12px; min-width:145px; pointer-events:none; }
.mTitle { color:#4a8aaa; font-size:10px; letter-spacing:2px; margin-bottom:5px; }
.mRow { display:flex; gap:7px; font-size:12px; margin-bottom:3px; }
.mRk { color:#ffd700; width:18px; }
.mNm { color:#aee; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:72px; }
.mSc { color:#ffd700; }
</style>
</head>
<body>

<!-- ТОГЛООМ -->
<div id="gameWrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="lc"><div class="btn" id="btnLeft">◀</div><div class="btn" id="btnRight">▶</div></div>
    <div id="rc"><div class="btn" id="btnJump">↑</div></div>
  </div>
  <div id="miniLb">
    <div class="mTitle">ШИЛДЭГ 3</div>
    <div id="miniRows"></div>
  </div>
</div>

<!-- LEADERBOARD -->
<div id="lbOverlay">
  <h2>🏆 ШИЛДЭГҮҮД</h2>
  <div class="lbTimer" id="lbTimer"></div>
  <div class="lbTable" id="lbTable"></div>
  <div id="myRank"></div>
  <button class="lbPlayBtn" id="lbPlayBtn">▶ Тоглох</button>
</div>

<script>
// ══════════════════════════════════
//  STORAGE
// ══════════════════════════════════
async function sGet(k,sh=true)   { try{const r=await window.storage.get(k,sh);return r?JSON.parse(r.value):null;}catch{return null;} }
async function sSet(k,v,sh=true) { try{await window.storage.set(k,JSON.stringify(v),sh);}catch(e){console.warn(e);} }

// ══════════════════════════════════
//  НЭР ОРУУЛАХ
// ══════════════════════════════════
let currentUser = 'Тоглогч';

// ══════════════════════════════════
//  LEADERBOARD  — 24 цаг reset
// ══════════════════════════════════
async function checkReset() {
  const today = new Date().toISOString().slice(0,10);
  const saved = await sGet('daibi_lb_date');
  if (saved !== today) { await sSet('daibi_lb',[]); await sSet('daibi_lb_date', today); }
}
async function getLB()           { await checkReset(); return (await sGet('daibi_lb')) || []; }
async function submitScore(name, sc) {
  const lb  = await getLB();
  const idx = lb.findIndex(e => e.name === name);
  if (idx >= 0) { if (sc > lb[idx].score) lb[idx].score = sc; }
  else lb.push({ name, score: sc });
  lb.sort((a,b) => b.score - a.score);
  await sSet('daibi_lb', lb.slice(0,100));
}

function msUntilMidnight() { const n=new Date(),m=new Date(n); m.setHours(24,0,0,0); return m-n; }
function fmtMs(ms) { const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000); return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }

let lbTick = null;
async function showLBOverlay() {
  const lb     = await getLB();
  const medals = ['🥇','🥈','🥉'];
  const tbl    = document.getElementById('lbTable');
  tbl.innerHTML = lb.length
    ? lb.slice(0,10).map((e,i) => `
        <div class="lbRow" style="${e.name===currentUser?'background:rgba(100,200,255,0.07)':''}">
          <span class="lbRank">${i<3?medals[i]:i+1}</span>
          <span class="lbName">${e.name}${e.name===currentUser?' ◀':''}</span>
          <span class="lbScore">${e.score}</span>
        </div>`).join('')
    : '<div class="lbEmpty">Одоогоор бичлэг байхгүй<br>Эхний тоглогч бол!</div>';

  const myIdx = lb.findIndex(e => e.name === currentUser);
  document.getElementById('myRank').textContent =
    myIdx >= 0 ? `Таны байр: ${myIdx+1}-р  (${lb[myIdx].score} оноо)` : '';

  const timerEl = document.getElementById('lbTimer');
  if (lbTick) clearInterval(lbTick);
  const tick = () => { timerEl.textContent = `🔄 Шинэчлэгдэх хугацаа: ${fmtMs(msUntilMidnight())}`; };
  tick(); lbTick = setInterval(tick, 1000);

  document.getElementById('lbOverlay').style.display = 'flex';
  document.getElementById('lbPlayBtn').onclick = () => {
    document.getElementById('lbOverlay').style.display = 'none';
    if (lbTick) { clearInterval(lbTick); lbTick = null; }
    reset();
  };
}

async function updateMiniLB() {
  const lb     = await getLB();
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('miniRows').innerHTML =
    lb.slice(0,3).map((e,i) => `
      <div class="mRow">
        <span class="mRk">${medals[i]}</span>
        <span class="mNm">${e.name}</span>
        <span class="mSc">${e.score}</span>
      </div>`).join('')
    || '<div style="color:#4a6a8a;font-size:11px">Хоосон</div>';
}

// ══════════════════════════════════
//  CANVAS + ТОГЛООМ
// ══════════════════════════════════
let C,cx,W,H, gameStarted=false;

function initCanvas() {
  C=document.getElementById('c'); cx=C.getContext('2d');
  W=Math.min(window.innerWidth,820); H=Math.min(window.innerHeight,430);
  C.width=W; C.height=H;
  bindControls();
  requestAnimationFrame(loop);
}

const GRAV_N=0.62,GRAV_D=0.28,SCR_BASE=2.0,PH=18,DFRS=90;
const DLINE=()=>H*0.80;
let camX=0,spd=SCR_BASE,fn=0,score=0,phase='wait';
let platforms=[],nxt=0;

const P={x:180,y:0,w:28,h:52,vx:0,vy:0,onGround:false,facing:1,state:'idle',frame:0,hp:3,invTimer:0,danger:false,dangerTimer:0,airJumps:0};

function initPlats(){
  platforms=[]; nxt=0;
  platforms.push({x:0,y:H*0.58,w:360,h:PH,passed:false,zombies:[]});
  nxt=400; genAhead();
}
function genAhead(){
  while(nxt<camX+W+700){
    const prev=platforms[platforms.length-1],py=prev?prev.y:H*0.58;
    const mn=Math.max(H*0.28,py-90),mx=Math.min(H*0.70,py+90);
    const y=mn+Math.random()*(mx-mn),w=95+Math.random()*130,gap=85+Math.random()*95;
    const pl={x:nxt,y,w,h:PH,passed:false,zombies:[]};
    if(Math.random()<0.35&&w>110) pl.zombies.push({wx:nxt+w*0.35,wy:y-44,w:28,h:44,vx:0.7*(Math.random()>0.5?1:-1),frame:0});
    platforms.push(pl); nxt+=gap+w;
  }
}
function cleanPlats(){ platforms=platforms.filter(p=>p.x+p.w>camX-150); }

function drawBG(){
  const sk=cx.createLinearGradient(0,0,0,H);
  sk.addColorStop(0,'#06050f'); sk.addColorStop(1,'#0f1a2e');
  cx.fillStyle=sk; cx.fillRect(0,0,W,H);
  cx.fillStyle='rgba(255,255,255,0.55)';
  [[40,18],[110,30],[200,12],[330,42],[470,18],[590,35],[700,10],[760,48],[85,52],[260,58]].forEach(([sx,sy])=>{cx.beginPath();cx.arc(sx,sy,1,0,Math.PI*2);cx.fill();});
  cx.fillStyle='#ccc8a0';cx.beginPath();cx.arc(W*0.82,52,20,0,Math.PI*2);cx.fill();
  cx.fillStyle='#0f1a2e';cx.beginPath();cx.arc(W*0.82+6,47,16,0,Math.PI*2);cx.fill();
  const o1=(camX*0.18)%(W+200); cx.fillStyle='#111828';
  [[0,H*0.22,70],[90,H*0.12,55],[165,H*0.28,80],[270,H*0.08,65],[360,H*0.18,95],[480,H*0.10,70],[580,H*0.25,60],[660,H*0.14,85],[770,H*0.20,65]].forEach(([bx,by,bw])=>{
    const rx=((bx-o1)%(W+200)+W+200)%(W+200)-100; cx.fillRect(rx,by,bw,H-by);
    for(let wy=by+12;wy<H*0.55;wy+=20) for(let wx=rx+6;wx<rx+bw-6;wx+=14) if(Math.sin(wx*7.3+wy*3.1)>0.2){cx.fillStyle='rgba(255,240,80,0.16)';cx.fillRect(wx,wy,8,11);cx.fillStyle='#111828';}
  });
  const o2=(camX*0.32)%(W+300); cx.fillStyle='#1a2235';
  [[40,H*0.32,65],[140,H*0.38,55],[220,H*0.26,75],[340,H*0.35,60],[440,H*0.24,85],[560,H*0.38,58],[660,H*0.28,72],[800,H*0.35,50]].forEach(([bx,by,bw])=>{
    const rx=((bx-o2)%(W+300)+W+300)%(W+300)-100;
    cx.beginPath();cx.moveTo(rx,by);cx.lineTo(rx+8,by-12);cx.lineTo(rx+20,by-5);cx.lineTo(rx+bw-15,by-8);cx.lineTo(rx+bw-5,by-15);cx.lineTo(rx+bw,by);cx.lineTo(rx+bw,H);cx.lineTo(rx,H);cx.closePath();cx.fill();
  });
  const fog=cx.createLinearGradient(0,H*0.68,0,H);fog.addColorStop(0,'rgba(0,10,25,0)');fog.addColorStop(1,'rgba(0,10,25,0.85)');
  cx.fillStyle=fog;cx.fillRect(0,H*0.68,W,H*0.32);
}

function drawPlat(p){
  const rx=p.x-camX;if(rx>W+10||rx+p.w<-10)return;
  const g=cx.createLinearGradient(0,p.y,0,p.y+p.h);g.addColorStop(0,'#6a7a8a');g.addColorStop(1,'#2a3a4a');
  cx.fillStyle=g;cx.fillRect(rx,p.y,p.w,p.h);
  cx.fillStyle='#8a9aaa';cx.fillRect(rx,p.y,p.w,3);
  cx.strokeStyle='rgba(20,30,45,0.6)';cx.lineWidth=1;
  for(let i=rx+24;i<rx+p.w-8;i+=28){cx.beginPath();cx.moveTo(i,p.y+3);cx.lineTo(i+9,p.y+p.h-2);cx.stroke();}
}

function drawHuman(){
  const rx=P.x-camX;cx.save();
  if(P.invTimer>0&&Math.floor(P.invTimer/5)%2===0) cx.globalAlpha=0.2;
  cx.translate(rx+P.w/2,P.y+P.h/2);cx.scale(P.facing,1);
  const f=P.frame,run=P.state==='run',jump=P.state==='jump';
  const ls=run?Math.sin(f*0.36)*16:0,as=run?Math.sin(f*0.36)*12:(jump?-25:0);
  [0,1].forEach(i=>{const ox=i?7:-7,rot=i?-ls:ls;cx.fillStyle='#1a3a8a';cx.save();cx.translate(ox,12);cx.rotate(rot*Math.PI/180);cx.fillRect(-5,0,10,24);cx.fillStyle='#0a0a0a';cx.fillRect(-5,21,11,5);cx.restore();});
  cx.fillStyle='#2a3d5a';cx.fillRect(-13,-12,26,24);cx.fillStyle='#3a5070';cx.fillRect(-9,-10,18,16);cx.fillStyle='#1a2a3a';cx.fillRect(-1,-10,2,16);
  [[-15,-8,-1],[15,-8,1]].forEach(([ox,oy,dir])=>{cx.fillStyle='#2a3d5a';cx.save();cx.translate(ox,oy);cx.rotate((as*dir)*Math.PI/180);cx.fillRect(-4,0,8,20);cx.fillStyle='#d09070';cx.fillRect(-4,17,8,7);cx.restore();});
  cx.fillStyle='#d09070';cx.beginPath();cx.ellipse(0,-21,13,13,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#2a1808';cx.beginPath();cx.ellipse(0,-30,13,7,0,0,Math.PI*2);cx.fill();cx.fillRect(-13,-32,26,14);
  cx.fillStyle='#fff';cx.fillRect(-9,-25,6,5);cx.fillRect(3,-25,6,5);
  cx.fillStyle='#1a1030';cx.beginPath();cx.arc(-6,-23,2,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(6,-23,2,0,Math.PI*2);cx.fill();
  if(P.danger){cx.globalAlpha=0.45+Math.sin(fn*0.25)*0.25;cx.strokeStyle='#ff3300';cx.lineWidth=3;cx.beginPath();cx.ellipse(0,0,20,32,0,0,Math.PI*2);cx.stroke();}
  cx.restore();
}

function drawZombie(z){
  const rx=z.wx-camX;if(rx>W+20||rx+z.w<-20)return;
  cx.save();cx.translate(rx+z.w/2,z.wy+z.h/2);
  const f=z.frame,sh=Math.sin(f*0.14)*10,tl=Math.sin(f*0.08)*6;cx.rotate(tl*Math.PI/180);
  [0,1].forEach(i=>{const ox=i?7:-7,rot=i?-sh+6:sh;cx.fillStyle='#3a5a28';cx.save();cx.translate(ox,14);cx.rotate(rot*Math.PI/180);cx.fillRect(-4,0,8,16);cx.fillStyle='#1a2a10';cx.fillRect(-5,13,10,5);cx.restore();});
  cx.fillStyle='#4a6835';cx.fillRect(-12,-8,24,22);cx.fillStyle='#3a5028';cx.fillRect(-10,-6,8,10);cx.fillRect(3,-6,8,10);
  cx.fillStyle='#5a7840';cx.save();cx.translate(-14,-2);cx.rotate(-35*Math.PI/180);cx.fillRect(-4,0,8,19);cx.fillStyle='#7a9858';cx.fillRect(-5,16,10,7);cx.restore();
  cx.save();cx.translate(14,-2);cx.rotate(35*Math.PI/180);cx.fillRect(-4,0,8,19);cx.fillStyle='#7a9858';cx.fillRect(-5,16,10,7);cx.restore();
  cx.fillStyle='#7a9858';cx.beginPath();cx.ellipse(0,-19,12,12,tl*0.3*Math.PI/180,0,Math.PI*2);cx.fill();
  cx.fillStyle='#ff3300';[[-5,-21],[5,-21]].forEach(([ex,ey])=>{cx.beginPath();cx.arc(ex,ey,3.5,0,Math.PI*2);cx.fill();cx.fillStyle='rgba(255,80,0,0.35)';cx.beginPath();cx.arc(ex,ey,6,0,Math.PI*2);cx.fill();cx.fillStyle='#ff3300';});
  cx.fillStyle='#180808';cx.beginPath();cx.ellipse(0,-13,5,3.5,0,0,Math.PI*2);cx.fill();
  cx.restore();
}

function drawHUD(){
  cx.fillStyle='rgba(0,0,0,0.55)';cx.beginPath();cx.roundRect(10,10,118,36,9);cx.fill();
  cx.fillStyle='#7df';cx.font='bold 22px Georgia';cx.textAlign='left';cx.fillText('ДАЙБИ',22,34);
  cx.fillStyle='rgba(0,0,0,0.55)';cx.beginPath();cx.roundRect(W/2-70,10,140,36,9);cx.fill();
  cx.fillStyle='#ffd700';cx.font='bold 16px Georgia';cx.textAlign='center';cx.fillText(`ОНОО: ${score}`,W/2,33);
  cx.fillStyle='rgba(0,0,0,0.45)';cx.beginPath();cx.roundRect(W/2-55,50,110,22,7);cx.fill();
  cx.fillStyle='#6af';cx.font='12px Georgia';cx.textAlign='center';cx.fillText(currentUser||'',W/2,65);
  for(let i=0;i<3;i++){cx.font='22px serif';cx.textAlign='right';cx.fillText(i<P.hp?'❤️':'🖤',W-10-i*30,36);}
  if(P.danger){
    const pct=P.dangerTimer/DFRS,bw=200,bx=W/2-bw/2,by=H*0.43;
    cx.fillStyle='rgba(0,0,0,0.78)';cx.beginPath();cx.roundRect(bx-14,by-38,bw+28,68,12);cx.fill();
    cx.fillStyle='rgba(80,0,0,0.85)';cx.fillRect(bx,by,bw,16);
    cx.fillStyle=pct>0.5?'#ff9900':'#ff2200';cx.fillRect(bx,by,bw*pct,16);
    cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(bx,by,bw*pct,6);
    cx.fillStyle='#fff';cx.font='bold 14px Georgia';cx.textAlign='center';cx.fillText('⚠  АЮУЛ — ПЛАТФОРМ ДЭЭР ГАР!',W/2,by-16);
    cx.fillStyle='#ffaa44';cx.font='13px Georgia';cx.fillText('↑ дарж үсрэн аврагд',W/2,by+33);
  }
}

function drawOverlay(){
  cx.fillStyle='rgba(0,0,0,0.72)';cx.fillRect(0,0,W,H);cx.textAlign='center';
  if(phase==='wait'){
    cx.fillStyle='#7df';cx.font=`bold ${W>500?40:28}px Georgia`;cx.fillText('ДАЙБИ',W/2,H/2-54);
    cx.fillStyle='#eee';cx.font=`${W>500?16:13}px Georgia`;cx.fillText('🧟  Зомби дүүрсэн хотоос зайл!',W/2,H/2-10);
    cx.fillStyle='#ffd700';cx.font=`${W>500?15:13}px Georgia`;cx.fillText('SPACE / ↑ дарж эхлүүлнэ',W/2,H/2+26);
  } else {
    cx.fillStyle='#ff3322';cx.font=`bold ${W>500?42:30}px Georgia`;cx.fillText('GAME OVER',W/2,H/2-42);
    cx.fillStyle='#ffd700';cx.font=`${W>500?22:16}px Georgia`;cx.fillText(`${score} платформ туулсан`,W/2,H/2+10);
    cx.fillStyle='#aaa';cx.font=`${W>500?14:11}px Georgia`;cx.fillText('SPACE / ↑ → шилдэгүүд харна',W/2,H/2+48);
  }
}

function boxHit(ax,ay,aw,ah,bx,by,bw,bh,mg=5){ return ax+mg<bx+bw&&ax+aw-mg>bx&&ay+mg<by+bh&&ay+ah>by+mg; }

function respawn(){
  const pl=platforms.filter(p=>p.x+p.w>camX+60).sort((a,b)=>a.x-b.x)[0];
  if(pl){P.x=pl.x+pl.w*0.25;P.y=pl.y-P.h;P.vy=0;P.vx=0;P.onGround=true;}
  else{P.x=camX+W*0.3;P.y=H*0.4;P.vy=0;}
  P.danger=false;P.dangerTimer=0;P.airJumps=0;P.invTimer=110;
}

function reset(){
  camX=0;spd=SCR_BASE;fn=0;score=0;
  Object.assign(P,{x:200,y:0,vx:0,vy:0,onGround:false,facing:1,state:'idle',frame:0,hp:3,invTimer:0,danger:false,dangerTimer:0,airJumps:0});
  initPlats();P.y=platforms[0].y-P.h;phase='play';
}

const keys={};let jq=false;
function bindControls(){
  document.addEventListener('keydown',e=>{
    if(!keys[e.code]&&(e.code==='ArrowUp'||e.code==='Space'))jq=true;
    keys[e.code]=true;
    if((e.code==='Space'||e.code==='ArrowUp')&&phase==='wait')reset();
    if((e.code==='Space'||e.code==='ArrowUp')&&phase==='over')handleGameOver();
    e.preventDefault();
  });
  document.addEventListener('keyup',e=>{keys[e.code]=false;});
  function bindBtn(id,code){
    const el=document.getElementById(id);if(!el)return;
    el.addEventListener('pointerdown',e=>{if(!keys[code]&&code==='ArrowUp')jq=true;keys[code]=true;if(phase==='wait')reset();if(phase==='over')handleGameOver();e.preventDefault();});
    el.addEventListener('pointerup',()=>{keys[code]=false;});
    el.addEventListener('pointerleave',()=>{keys[code]=false;});
  }
  bindBtn('btnLeft','ArrowLeft');bindBtn('btnRight','ArrowRight');bindBtn('btnJump','ArrowUp');
}

async function handleGameOver(){
  if(!currentUser)return;
  await submitScore(currentUser,score);
  await updateMiniLB();
  showLBOverlay();
}

function update(){
  if(phase!=='play'){jq=false;return;}
  fn++;spd=Math.min(SCR_BASE+fn*0.00028,5.5);camX+=spd;
  P.vx=0;
  if(keys['ArrowLeft']){P.vx=-3.5;P.facing=-1;}
  if(keys['ArrowRight']){P.vx=4.5;P.facing=1;}
  if(jq){if(P.onGround){P.vy=-14.5;P.onGround=false;}else if(P.danger&&P.airJumps>0){P.vy=-13;P.airJumps--;}}
  jq=false;
  P.vy=Math.min(P.vy+(P.danger?GRAV_D:GRAV_N),20);
  P.x+=P.vx;P.y+=P.vy;P.onGround=false;
  if(P.x<camX+22){P.x=camX+22;P.vx=0;}
  if(P.x+P.w>camX+W-10)P.x=camX+W-10-P.w;
  platforms.forEach(pl=>{
    const inX=P.x+P.w-6>pl.x&&P.x+6<pl.x+pl.w,pb=P.y+P.h-P.vy,cb=P.y+P.h;
    if(inX&&pb<=pl.y+5&&cb>=pl.y&&P.vy>=0){
      P.y=pl.y-P.h;P.vy=0;P.onGround=true;
      if(P.danger){P.danger=false;P.dangerTimer=0;P.hp=Math.max(0,P.hp-1);P.invTimer=90;if(P.hp<=0){phase='over';handleGameOver();return;}}
    }
    if(!pl.passed&&P.x>pl.x+pl.w){pl.passed=true;score++;}
  });
  P.state=!P.onGround?'jump':(P.vx!==0?'run':'idle');P.frame++;
  if(P.invTimer>0)P.invTimer--;
  if(!P.onGround&&!P.danger&&P.y>DLINE()){P.danger=true;P.dangerTimer=DFRS;P.airJumps=1;}
  if(P.danger){
    P.dangerTimer--;
    if(P.dangerTimer<=0||P.y>H+80){P.hp=Math.max(0,P.hp-1);if(P.hp<=0){phase='over';handleGameOver();return;}respawn();}
  }
  platforms.forEach(pl=>{
    pl.zombies.forEach(z=>{
      z.wx+=z.vx;z.frame++;z.wy=pl.y-z.h;
      if(z.wx<pl.x+8||z.wx+z.w>pl.x+pl.w-8)z.vx*=-1;
      if(P.invTimer===0&&!P.danger&&boxHit(P.x,P.y,P.w,P.h,z.wx,z.wy,z.w,z.h)){
        P.hp=Math.max(0,P.hp-1);P.invTimer=95;P.vy=-9;P.vx=P.x<z.wx+z.w/2?-5:5;
        if(P.hp<=0){phase='over';handleGameOver();}
      }
    });
  });
  genAhead();cleanPlats();
}

function draw(){
  if(!cx)return;
  cx.clearRect(0,0,W,H);drawBG();
  platforms.forEach(drawPlat);
  platforms.forEach(pl=>pl.zombies.forEach(drawZombie));
  drawHuman();drawHUD();
  if(phase!=='play')drawOverlay();
}

function loop(){ update();draw();requestAnimationFrame(loop); }

// Шууд тоглоом эхлүүлнэ
updateMiniLB();
initCanvas();
showLBOverlay();
</script>
